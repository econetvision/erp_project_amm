version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER:     erp_user
      POSTGRES_PASSWORD: erp_pass
      POSTGRES_DB:       erp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0-dev}
        BUILD_SHA: ${BUILD_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: erp_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://erp_user:erp_pass@postgres:5432/erp_db
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    volumes:
      - ./backend:/app

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_GOOGLE_MAPS_API_KEY: ${REACT_APP_GOOGLE_MAPS_API_KEY:-AIzaSyB2TjUmLAmRtkDLATvhdeWMRSQcyvrjI7o}
        REACT_APP_VERSION: ${APP_VERSION:-1.0.0-dev}
        REACT_APP_BUILD_SHA: ${BUILD_SHA:-dev}
        REACT_APP_BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: erp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
