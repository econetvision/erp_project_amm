name: Build Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      api_base_url:
        description: 'API Base URL'
        required: true
        default: 'https://erpprojectamm-production-595f.up.railway.app'
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: ./mobile
        run: chmod +x gradlew

      - name: Validate version_code is an integer
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::version_code must be a positive integer (e.g., 1, 2, 3), got: $VERSION_CODE"
            exit 1
          fi
          echo "Version code validated: $VERSION_CODE"

      - name: Update version in build.gradle.kts
        working-directory: ./mobile
        run: |
          sed -i 's/versionCode = [0-9]*/versionCode = ${{ github.event.inputs.version_code }}/' app/build.gradle.kts
          sed -i 's/versionName = "[^"]*"/versionName = "${{ github.event.inputs.version }}"/' app/build.gradle.kts
          sed -i 's|buildConfigField("String", "API_BASE_URL", "[^"]*")|buildConfigField("String", "API_BASE_URL", "\"${{ github.event.inputs.api_base_url }}\"")|' app/build.gradle.kts
          echo "Updated build.gradle.kts:"
          cat app/build.gradle.kts | grep -E "(versionCode|versionName|API_BASE_URL)"

      - name: Build Release APK
        working-directory: ./mobile
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        working-directory: ./mobile
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/erp-v${{ github.event.inputs.version }}.apk

      - name: List APK files
        working-directory: ./mobile
        run: |
          echo "APK files generated:"
          ls -la app/build/outputs/apk/release/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: erp-mobile-v${{ github.event.inputs.version }}
          path: mobile/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ github.event.inputs.version }}
          name: ERP Mobile v${{ github.event.inputs.version }}
          body: |
            ## ERP Mobile App v${{ github.event.inputs.version }}

            ### Release Info
            - **Version Name:** ${{ github.event.inputs.version }}
            - **Version Code:** ${{ github.event.inputs.version_code }}
            - **API URL:** ${{ github.event.inputs.api_base_url }}
            - **Build:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK file to install

            ### Changes
            See commit history for changes since last release.
          files: mobile/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "### Mobile APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version }} (code: ${{ github.event.inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** ${{ github.event.inputs.api_base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.create_release }}" == "true" ]; then
            echo "**Release:** [mobile-v${{ github.event.inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/mobile-v${{ github.event.inputs.version }})" >> $GITHUB_STEP_SUMMARY
          fi
