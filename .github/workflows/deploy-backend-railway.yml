name: Deploy Backend to Railway

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        shell: bash
        run: |
          curl -fsSL https://railway.app/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway CLI Installation
        shell: bash
        run: railway --version

      - name: Create Railway Config
        shell: bash
        working-directory: ./backend
        run: |
          echo '{"projectId": "${{ secrets.RAILWAY_PROJECT_ID }}"}' > railway.json
          cat railway.json

      - name: List Railway Services
        shell: bash
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Available services in the project:"
          railway status || echo "Could not get status"

      - name: Deploy to Railway
        shell: bash
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Starting deployment to Railway..."
          railway up --service erp_project_amm

      - name: Health Check
        shell: bash
        continue-on-error: true
        run: |
          echo "Waiting for deployment to be live..."
          sleep 30
          curl -f https://${{ secrets.RAILWAY_BACKEND_URL }}/health || echo "Health check failed, please verify manually"

      - name: Deployment Summary
        shell: bash
        run: |
          echo "### ✅ Backend Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** Railway" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** https://${{ secrets.RAILWAY_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View logs at: https://railway.app/dashboard" >> $GITHUB_STEP_SUMMARY
