name: Deploy Backend to Railway

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'Procfile'
      - 'nixpacks.toml'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        shell: bash
        run: |
          curl -fsSL https://railway.app/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway CLI Installation
        shell: bash
        run: railway --version

      - name: Create Railway Config
        shell: bash
        run: |
          echo '{"projectId": "${{ secrets.RAILWAY_PROJECT_ID }}"}' > railway.json
          cat railway.json

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          APP_VERSION: ${{ github.ref_name }}-${{ github.run_number }}
          BUILD_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          # Static master license + external license server (from repo secrets).
          # NOTE: for these to reach the running service they must ALSO exist as
          # Railway service variables — see the sync step below.
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}
          LICENSE_ENFORCE: ${{ secrets.LICENSE_ENFORCE }}
        run: |
          echo "Starting deployment to Railway..."
          railway up --service erp_project_amm

      - name: Sync license variables to Railway service
        shell: bash
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
          LICENSE_SERVER_URL: ${{ secrets.LICENSE_SERVER_URL }}
          LICENSE_ENFORCE: ${{ secrets.LICENSE_ENFORCE }}
        run: |
          # railway up does not push CI-step env into the runtime; set them as
          # service variables so the backend reads them via config.settings.
          if [ -n "$LICENSE_KEY" ]; then
            railway variables --service erp_project_amm --set "LICENSE_KEY=$LICENSE_KEY"
          fi
          if [ -n "$LICENSE_SERVER_URL" ]; then
            railway variables --service erp_project_amm --set "LICENSE_SERVER_URL=$LICENSE_SERVER_URL"
          fi
          if [ -n "$LICENSE_ENFORCE" ]; then
            railway variables --service erp_project_amm --set "LICENSE_ENFORCE=$LICENSE_ENFORCE"
          fi

      - name: Check Migration Status
        shell: bash
        run: |
          # Migrations run inside the container at startup (entrypoint.sh). We read
          # the applied revision from the deployed /health endpoint — no Python deps
          # or DB access are needed on the runner (the old `railway run python
          # migrate.py` ran on the runner with neither, hence the ModuleNotFound).
          # This also doubles as the "wait for the app to come up" gate.
          URL="https://${{ secrets.RAILWAY_BACKEND_URL }}/health"
          echo "Waiting for backend and checking DB migration status at $URL ..."
          for i in $(seq 1 6); do
            echo "Attempt $i/6..."
            sleep 20
            resp=$(curl -sf "$URL" || true)
            if [ -n "$resp" ]; then
              echo "$resp" | jq . || echo "$resp"
              dbstatus=$(echo "$resp" | jq -r '.database.status')
              migration=$(echo "$resp" | jq -r '.database.last_migration')
              echo "Current DB migration: $migration"
              if [ "$dbstatus" != "ok" ]; then
                echo "Database is not healthy: $dbstatus"
                exit 1
              fi
              echo "Migration check passed (revision: $migration)."
              exit 0
            fi
            echo "Backend not ready yet, retrying..."
          done
          echo "Backend did not become ready in time."
          exit 1

      - name: Health Check
        shell: bash
        run: |
          # App is already up (the migration step waited for it) — final assertion.
          echo "Final health check..."
          if curl -sf "https://${{ secrets.RAILWAY_BACKEND_URL }}/health" > /dev/null; then
            echo "Health check passed!"
          else
            echo "Health check failed. Verify at the Railway dashboard."
            exit 1
          fi

      - name: Deployment Summary
        shell: bash
        run: |
          echo "### ✅ Backend Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** Railway" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** https://${{ secrets.RAILWAY_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View deployment logs at: https://railway.app/dashboard" >> $GITHUB_STEP_SUMMARY
