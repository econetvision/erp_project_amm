name: Deploy Backend to Railway

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'Procfile'
      - 'nixpacks.toml'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        shell: bash
        run: |
          curl -fsSL https://railway.app/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Verify Railway CLI Installation
        shell: bash
        run: railway --version

      - name: Create Railway Config
        shell: bash
        run: |
          echo '{"projectId": "${{ secrets.RAILWAY_PROJECT_ID }}"}' > railway.json
          cat railway.json

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Starting deployment to Railway..."
          railway up --service erp_project_amm

      - name: Health Check
        shell: bash
        continue-on-error: true
        run: |
          echo "Waiting for deployment to be live..."
          sleep 45
          curl -f https://${{ secrets.RAILWAY_BACKEND_URL }}/health || echo "Health check failed, please verify manually at Railway dashboard"

      - name: Check Migration Status
        shell: bash
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Checking database migration status..."
          railway run --service erp_project_amm -- bash -c "cd backend && python migrate.py current"

      - name: Deployment Summary
        shell: bash
        run: |
          echo "### ✅ Backend Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** Railway" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** https://${{ secrets.RAILWAY_BACKEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View deployment logs at: https://railway.app/dashboard" >> $GITHUB_STEP_SUMMARY
